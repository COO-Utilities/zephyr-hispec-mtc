# Serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Stack sizes for networking + control
CONFIG_MAIN_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_REGULATOR_TPS55287Q1_LOG_LEVEL=4

# Floating-point printf support
CONFIG_CBPRINTF_FP_SUPPORT=y

# SPI support (for AD7124)
CONFIG_SPI=y

# I2C support (for TPS55287Q1)
CONFIG_I2C=y

# ADC support
CONFIG_ADC=y

# Regulator subsystem
CONFIG_REGULATOR=y
CONFIG_REGULATOR_TPS55287Q1=y

# Networking stack
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Ethernet driver
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y
CONFIG_ETH_STM32_HAL_API_V2=y

# DNS for hostname resolution
CONFIG_DNS_RESOLVER=y

# DHCP client
CONFIG_NET_DHCPV4=y

# Network buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

# MQTT support
# 5.0 is required, not optional: command_dispatch uses the publish properties
# (response_topic, correlation_data) that only exist in the v5 wire format.
CONFIG_MQTT_LIB=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_MQTT_KEEPALIVE=60

# JSON parsing for the command dispatcher
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y

# Console subsystem backs the dispatcher's serial command duals
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y
CONFIG_CONSOLE_GETCHAR_BUFSIZE=128

# NVS-backed settings persistence, so configuration survives a power cycle
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# COO libraries - hardware control
CONFIG_COO_CONFIG_LIB=y
CONFIG_COO_HEATERS_LIB=y
CONFIG_COO_SENSORS_LIB=y
CONFIG_COO_CONTROL_LIB=y

# COO libraries - networking and MQTT
CONFIG_COO_COMMONS=y
CONFIG_COO_MQTT=y
CONFIG_COO_JSON=y

# Briefly reject MQTT effect commands after local serial activity, so a bench
# operator and the ICS cannot drive the controller against each other
CONFIG_COO_CMD_SERIAL_GUARD=y
CONFIG_COO_CMD_SERIAL_GUARD_DEFAULT_SECONDS=30
CONFIG_COO_MQTT_BROKER_HOSTNAME="centaurus.caltech.edu"
CONFIG_COO_MQTT_BROKER_PORT="1883"
