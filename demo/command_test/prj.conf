CONFIG_LOG=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_ADC=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_TPS55287Q1=y

# command_dispatch pulls in MQTT + NVS + JSON; networking is required to link it
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_COO_CONFIG_LIB=y
CONFIG_COO_SENSORS_LIB=y
CONFIG_COO_HEATERS_LIB=y
CONFIG_COO_CONTROL_LIB=y
CONFIG_COO_COMMONS=y
CONFIG_COO_MQTT=y
CONFIG_COO_JSON=y
CONFIG_COO_COMMANDS_LIB=y
