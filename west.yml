manifest:
  self:
    west-commands: scripts/west-commands.yml

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      # Pinned rather than tracking main: coo_commons needs >= 4.4 for
      # zephyr/kvss/nvs.h and console_set_rx_timeout(), and a floating
      # revision makes CI non-reproducible.
      revision: v4.4.0
      import:
        name-allowlist:
          - hal_stm32  # required by the nucleo_h563zi board (STM32 based)
          - cmsis_6    # required by Cortex-M cores (ARM architecture)
